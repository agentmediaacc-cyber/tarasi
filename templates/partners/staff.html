{% extends "base.html" %}
{% block content %}
<section class="partner-shell single">
  <div class="partner-form-card">
    <p class="eyebrow">Staff accounts</p>
    <h1>Create company support staff</h1>
    <form method="POST" class="partner-form">
      <label>Full name<input name="full_name" required></label>
      <label>Email<input type="email" name="email" required></label>
      <label>Phone<input name="phone"></label>
      <label>Role
        <select name="role">
          <option>Support staff</option>
          <option>Dispatcher</option>
          <option>Finance staff</option>
          <option>Operations manager</option>
        </select>
      </label>
      <label>Temporary PIN<input name="temporary_pin" placeholder="Leave empty to auto-generate"></label>
      <button>Create staff account</button>
    </form>

    <div class="partner-card wide">
      <h2>Staff list</h2>
      {% for s in staff %}
      <div class="partner-row">
        <strong>{{ s.full_name }}</strong><span>{{ s.role }}</span><span>{{ s.email }}</span><em>{{ s.status }}</em>
      </div>
      {% else %}<p>No staff yet.</p>{% endfor %}
    </div>
  </div>
</section>
{% endblock %}
