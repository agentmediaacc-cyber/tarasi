{% extends "base.html" %}
{% block content %}
<section class="partner-shell single">
  <div class="partner-form-card">
    <p class="eyebrow">Driver management</p>
    <h1>Register drivers under your company</h1>
    <form method="POST" class="partner-form">
      <label>Full name<input name="full_name" required></label>
      <label>Email<input type="email" name="email" required></label>
      <label>Phone<input name="phone" required></label>
      <label>Temporary PIN<input name="temporary_pin" placeholder="Leave empty to auto-generate"></label>
      <label>Based area
        <select name="based_area">{% for area in areas %}<option>{{ area }}</option>{% endfor %}</select>
      </label>
      <label>Assign vehicle
        <select name="assigned_vehicle_id">
          <option value="">No vehicle yet</option>
          {% for car in fleet %}<option value="{{ car.vehicle_id }}">{{ car.vehicle_name }} - {{ car.plate_number }}</option>{% endfor %}
        </select>
      </label>
      <button>Create partner driver</button>
    </form>

    <div class="partner-card wide">
      <h2>Your drivers</h2>
      {% for d in drivers %}
      <div class="partner-row">
        <strong>{{ d.full_name }}</strong><span>{{ d.email }}</span><span>{{ d.phone }}</span><em>{{ d.verification_status }}</em>
      </div>
      {% else %}<p>No drivers yet.</p>{% endfor %}
    </div>
  </div>
</section>
{% endblock %}
